<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet Clash</title>
    <!-- css link -->
     <link rel="stylesheet" href="style.css">
     <!-- DaisyUI link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <main class="bg-[#1E1E1E] min-h-screen bg-[url(images/background.png)] bg-no-repeat bg-center">
        <section id="homePart" class="home flex justify-center items-center min-h-screen">
        <div class="text-white flex flex-col items-center gap-8">
            <h1 class="text-8xl text-white font-anton">ALPHABET CLASH</h1>
            <p class="font-poppins text-xl">Unleash Your Keyboard Kung Fu : Press “Enter” to Play</p>
            <button onclick="play()" class="btn font-poppins text-xl btn-soft btn-secondary">Play Now</button>
        </div>
        </section>
        <section id="play-ground" class="hidden">
        <div class="flex flex-col gap-20 pt-20">
            <!-- screen -->
            <div class="h-70 w-3/6 mx-auto border-[#010313CC] border-[15px] rounded-xl bg-[#FFFFFFB3]">
                <div class=" flex justify-center items-center">
                    <p class="bg-[#2F2941] text-white text-xl pb-2 px-4 rounded-b-2xl font-poppins">Don't watch keyboard while
                        playing...</p>
                </div>
                <div class="flex justify-center items-center">
                    <p class="text-9xl font-bold">Y</p>
                </div>
            </div>
            <!-- keybord start -->
            <div>
                <div class="my-1 flex w-full justify-center gap-1">
                    <kbd class="kbd">q</kbd>
                    <kbd class="kbd">w</kbd>
                    <kbd class="kbd">e</kbd>
                    <kbd class="kbd">r</kbd>
                    <kbd class="kbd">t</kbd>
                    <kbd class="kbd bg-yellow-300">y</kbd>
                    <kbd class="kbd">u</kbd>
                    <kbd class="kbd">i</kbd>
                    <kbd class="kbd">o</kbd>
                    <kbd class="kbd">p</kbd>
                </div>
                <div class="my-1 flex w-full justify-center gap-1">
                    <kbd class="kbd">a</kbd>
                    <kbd class="kbd">s</kbd>
                    <kbd class="kbd">d</kbd>
                    <kbd class="kbd">f</kbd>
                    <kbd class="kbd">g</kbd>
                    <kbd class="kbd">h</kbd>
                    <kbd class="kbd">j</kbd>
                    <kbd class="kbd">k</kbd>
                    <kbd class="kbd">l</kbd>
                </div>
                <div class="my-1 flex w-full justify-center gap-1">
                    <kbd class="kbd">z</kbd>
                    <kbd class="kbd">x</kbd>
                    <kbd class="kbd">c</kbd>
                    <kbd class="kbd">v</kbd>
                    <kbd class="kbd">b</kbd>
                    <kbd class="kbd">n</kbd>
                    <kbd class="kbd">m</kbd>
                    <kbd class="kbd">/</kbd>
                </div>
            </div>
            <!-- keybord end -->
            <div class="flex justify-between w-3/6 mx-auto">
                <button class="btn btn-active btn-secondary rounded-full">Life
                    <img src="./images/Group 23.svg" alt="">
                    <span>1</span>
                </button>
                <button class="btn btn-active btn-secondary rounded-full">score
                    <img src="./images/monetization_on.png" alt="">
                    <span>1</span>
                </button>
            </div>
            <!-- score -->
        </div>
        </section>
        <section class="score flex flex-col justify-center items-center min-h-screen font-poppins hidden">
        <div class="text-white  space-y-7 border rounded-lg p-6 bg justify-center flex flex-col items-center">
            <h1 class="text-8xl font-extrabold">
                <span>Score :</span>
                <span>14</span>
                </h1>
                <button class="btn btn-dash btn-secondary">Play Again</button>
                <p>Practice will make you Pro</p>
        </div>
        </section>
    </main>
    <script src="./js/utility.js"></script>
    <script src="./js/hidden.js"></script>
</body>
</html>
